database:
  host: localhost
  port: 5433
  name: openbrain
  user: postgres
  timezone: auto

embedder:
  provider: ollama
  model: nomic-embed-text
  dimensions: 768
  ollama_base_url: http://ollama:11434

mcp:
  transport: stdio

api:
  host: 127.0.0.1
  port: 8000
  cors_origins:
    - http://localhost:8501
    - http://localhost:8000

dashboard:
  port: 8501

tags:
  deny_list:
    - password
    - secret
    - api_key
    - token
    - credential
  default_tags:
    - auto

analytics:
  trend_weeks: 4
  weekly_report_day: 6

security:
  mode: direct
