services:
  api:
    build: .
    container_name: openbrain-api
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
    - .env
    environment:
      DB_HOST: postgres
      DB_NAME: openbrain
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      DB_PORT: 5432
      DB_USER: postgres
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
    - 127.0.0.1:${API_PORT:-8765}:8000
  dashboard:
    build: .
    command: streamlit run ui/dashboard.py --server.port=8501 --server.address=0.0.0.0
    container_name: openbrain-dashboard
    depends_on:
    - postgres
    env_file:
    - .env
    environment:
      DB_HOST: postgres
      DB_NAME: openbrain
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      DB_PORT: 5432
      DB_USER: postgres
      STREAMLIT_PORT: 8501
    ports:
    - 127.0.0.1:${DASHBOARD_PORT:-8501}:8501
    volumes:
    - ./.streamlit:/root/.streamlit
  postgres:
    container_name: openbrain-postgres
    environment:
      POSTGRES_DB: openbrain
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_USER: postgres
    healthcheck:
      interval: 5s
      retries: 5
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      timeout: 5s
    image: pgvector/pgvector:pg16
    ports:
    - "127.0.0.1:${DB_HOST_PORT:-5433}:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data
  ollama:
    container_name: openbrain-ollama
    image: ollama/ollama:latest
    ports:
    - 127.0.0.1:11434:11434
    volumes:
    - ollama_data:/root/.ollama
    healthcheck:
      interval: 10s
      retries: 6
      test: ["CMD", "ollama", "list"]
      timeout: 5s
volumes:
  postgres_data: null
  ollama_data: null
